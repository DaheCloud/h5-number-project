<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能筛选 - 现代App风格</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 在这里可以一键修改你的 App 主题色 (科技紫、活力橙、经典绿等) */
    :root {
      --theme-color: #10B981; /* 当前示例使用智能分析的翡翠绿，可改为 #7030FF 等 */
      --theme-color-light: #ECFDF5;
    }
    .bg-theme { bg-color: var(--theme-color); background-color: var(--theme-color); }
    .text-theme { color: var(--theme-color); }
    .border-theme { border-color: var(--theme-color); }
    .bg-theme-light { background-color: var(--theme-color-light); }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen pb-32 font-sans antialiased select-none">

  <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center space-x-3">
      <i data-lucide="arrow-left" class="w-6 h-6 text-gray-600 cursor-pointer"></i>
      <h1 class="text-lg font-bold text-gray-800 tracking-wide">高级号码筛选</h1>
    </div>
    <button class="text-sm font-medium text-gray-500 hover:text-gray-800 transition-colors flex items-center gap-1">
      <i data-lucide="rotate-ccw" class="w-4 h-4"></i> 重置
    </button>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">

    <section class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-2">
          <span class="w-1 h-4 bg-theme rounded-full"></span>
          <h2 class="font-bold text-gray-800">基础属性快速筛选</h2>
        </div>
        <i data-lucide="chevron-up" class="w-4 h-4 text-gray-400"></i>
      </div>
      
      <div class="space-y-2">
        <label class="text-xs font-semibold text-gray-400 block">常规属性</label>
        <div class="grid grid-cols-4 gap-2 p-1 bg-gray-100 rounded-xl">
          <button class="py-2 text-sm font-medium rounded-lg bg-white shadow-sm text-gray-800">单</button>
          <button class="py-2 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-700">双</button>
          <button class="py-2 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-700">大</button>
          <button class="py-2 text-sm font-medium rounded-lg text-gray-500 hover:text-gray-700">小</button>
        </div>
      </div>

      <div class="space-y-2">
        <label class="text-xs font-semibold text-gray-400 block">波色过滤</label>
        <div class="grid grid-cols-3 gap-3">
          <button class="py-2.5 rounded-xl border-2 border-red-500 bg-red-50 text-red-600 font-bold text-sm shadow-sm transition-all">红波</button>
          <button class="py-2.5 rounded-xl bg-gray-50 text-gray-600 font-medium text-sm border border-gray-100 hover:bg-gray-100 transition-all">绿波</button>
          <button class="py-2.5 rounded-xl bg-gray-50 text-gray-600 font-medium text-sm border border-gray-100 hover:bg-gray-100 transition-all">蓝波</button>
        </div>
      </div>

      <div class="space-y-2">
        <label class="text-xs font-semibold text-gray-400 block">五行属性</label>
        <div class="grid grid-cols-5 gap-2">
          <button class="py-2 rounded-xl text-xs font-medium bg-theme text-white font-semibold transition-all">金</button>
          <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-600 hover:bg-gray-100 transition-all">木</button>
          <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-600 hover:bg-gray-100 transition-all">水</button>
          <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-600 hover:bg-gray-100 transition-all">火</button>
          <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-600 hover:bg-gray-100 transition-all">土</button>
        </div>
      </div>
    </section>

    <section class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-2">
          <span class="w-1 h-4 bg-theme rounded-full"></span>
          <h2 class="font-bold text-gray-800">生肖与联动属性</h2>
        </div>
        <i data-lucide="chevron-up" class="w-4 h-4 text-gray-400"></i>
      </div>

      <div class="grid grid-cols-4 gap-2">
        <button class="py-3 rounded-xl text-sm font-medium bg-gray-50 text-gray-700 border border-transparent hover:bg-gray-100 transition-all">鼠</button>
        <button class="py-3 rounded-xl text-sm font-bold bg-theme-light text-theme border border-theme transition-all shadow-sm">牛</button>
        <button class="py-3 rounded-xl text-sm font-medium bg-gray-50 text-gray-700 border border-transparent hover:bg-gray-100 transition-all">虎</button>
        <button class="py-3 rounded-xl text-sm font-medium bg-gray-50 text-gray-700 border border-transparent hover:bg-gray-100 transition-all">兔</button>
        <button class="py-3 rounded-xl text-sm font-medium bg-gray-50 text-gray-700 border border-transparent hover:bg-gray-100 transition-all">龙</button>
        <button class="py-3 rounded-xl text-sm font-medium bg-gray-50 text-gray-700 border border-transparent hover:bg-gray-100 transition-all">蛇</button>
        <button class="py-3 rounded-xl text-sm font-medium bg-gray-50 text-gray-700 border border-transparent hover:bg-gray-100 transition-all">马</button>
        <button class="py-3 rounded-xl text-sm font-medium bg-gray-50 text-gray-700 border border-transparent hover:bg-gray-100 transition-all">羊</button>
      </div>

      <div class="pt-2 border-t border-gray-100 grid grid-cols-2 gap-3">
        <button class="py-2.5 rounded-xl text-xs font-semibold bg-blue-50 text-blue-600 border border-blue-100">蓝单</button>
        <button class="py-2.5 rounded-xl text-xs font-semibold bg-gray-50 text-gray-500">蓝双</button>
      </div>
    </section>

    <section class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-2">
          <span class="w-1 h-4 bg-theme rounded-full"></span>
          <h2 class="font-bold text-gray-800">尾数精确控制</h2>
        </div>
        <span class="text-xs text-gray-400 font-normal">多选</span>
      </div>

      <div class="grid grid-cols-5 gap-2">
        <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-700 hover:bg-gray-100">0尾</button>
        <button class="py-2 rounded-xl text-xs font-bold bg-theme text-white shadow-md shadow-emerald-100">1尾</button>
        <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-700 hover:bg-gray-100">2尾</button>
        <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-700 hover:bg-gray-100">3尾</button>
        <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-700 hover:bg-gray-100">4尾</button>
        <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-700 hover:bg-gray-100">5尾</button>
        <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-700 hover:bg-gray-100">6尾</button>
        <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-700 hover:bg-gray-100">7尾</button>
        <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-700 hover:bg-gray-100">8尾</button>
        <button class="py-2 rounded-xl text-xs font-medium bg-gray-50 text-gray-700 hover:bg-gray-100">9尾</button>
      </div>
    </section>

    <section class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
      <div class="flex items-center justify-between cursor-pointer">
        <div class="flex items-center space-x-2">
          <span class="w-1 h-4 bg-gray-300 rounded-full"></span>
          <h2 class="font-bold text-gray-500">合数与段数高级精选</h2>
        </div>
        <div class="flex items-center space-x-1.5">
          <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">已隐藏</span>
          <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
        </div>
      </div>
    </section>

  </main>

  <footer class="fixed bottom-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-lg border-t border-gray-100 p-4 shadow-[0_-8px_24px_rgba(0,0,0,0.04)]">
    <div class="max-w-md mx-auto flex items-center justify-between gap-4">
      <div class="flex flex-col">
        <span class="text-xs text-gray-400 font-medium">当前锁定条件</span>
        <span class="text-base font-extrabold text-gray-800"><span class="text-theme">3</span> 个维度</span>
      </div>
      <div class="flex items-center gap-2 flex-1 justify-end">
        <button class="px-5 py-3 rounded-xl bg-gray-100 text-gray-600 font-medium text-sm active:scale-95 transition-transform">
          查看结果
        </button>
        <button class="px-8 py-3 rounded-xl bg-theme text-white font-bold text-sm shadow-lg shadow-emerald-200 active:scale-95 transition-all flex items-center gap-1">
          <i data-lucide="filter" class="w-4 h-4"></i> 执行筛选
        </button>
      </div>
    </div>
  </footer>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
